<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" 
    rel="stylesheet" />

    <!-- link for font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">

    <title>Google Clone</title>
</head>
<body>
    <!-- header starts -->
    <div class="header">
        <div class="left-header">
            <p class="open-sans-charr">Gmail</p>
            <p class="open-sans-charr">Images</p>
            <span class="material-symbols-outlined">experiment</span>
            <span class="material-symbols-outlined">apps</span>
            <div class="profile">
                <span class="material-symbols-outlined">account_circle</span>
            </div>
        </div>
    </div>
    <!-- header ends -->

    <!-- body starts -->
    <div class="body">
        <div class="logodev">
            <img src="logo.png" alt="google-logo" class="logo-img" />
        </div>
        <div class="searchdiv">
            <div class="search">
                <span class="material-symbols-outlined">add</span>
                <input type="text" class="search-input" />
                <div class="options">
                    <span class="material-symbols-outlined">mic</span>
                    <span class="material-symbols-outlined">photo_camera</span>
                    <div class="aimode">
                        <span class="material-symbols-outlined">saved_search</span>
                        <p class="open-sans-charr">AI Mode</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="buttons">
            <div class="search-btn">
                <button class="search-btn-input">Google Search</button>
            </div>
            <div class="lucky-btn">
                <button class="lucky-btn-input">I'm Feeling Lucky</button>
            </div>
        </div>
        
    </div>
    
    <!-- body ends -->

    <!-- Note starts -->
     <div class="note">
        <p>Google offered in: <a class="sin" href="#">සිංහල</a> <a href="#">தமிழ்</a></p>
     </div>
    <!-- Note ends -->
</body>
</html>
